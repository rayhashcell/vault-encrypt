name: Publish GitHub Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag. Defaults to v<package.json version>."
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve release version
        id: version
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && -n "${REQUESTED_VERSION}" ]]; then
            release_tag="${REQUESTED_VERSION}"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            release_tag="${GITHUB_REF_NAME}"
          else
            release_tag="v$(node -p "require('./package.json').version")"
          fi

          if [[ ! "${release_tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Release tag must use v-prefixed semver like v2.4.11."
            exit 1
          fi

          plugin_version="${release_tag#v}"
          package_version="$(node -p "require('./package.json').version")"
          if [[ "${package_version}" != "${plugin_version}" ]]; then
            echo "::error::package.json version ${package_version} does not match release tag ${release_tag}."
            exit 1
          fi

          echo "plugin_version=${plugin_version}" >> "${GITHUB_OUTPUT}"
          echo "release_tag=${release_tag}" >> "${GITHUB_OUTPUT}"

      - name: Build plugin
        run: npm run build

      - name: Verify release assets
        id: assets
        shell: bash
        run: |
          set -euo pipefail

          version="${{ steps.version.outputs.plugin_version }}"
          asset_dir="dist/vault-encrypt-${version}/vault-encrypt"
          assets=(
            "${asset_dir}/main.js"
            "${asset_dir}/manifest.json"
            "${asset_dir}/styles.css"
          )

          for asset in "${assets[@]}"; do
            if [[ ! -f "${asset}" ]]; then
              echo "::error::Missing release asset: ${asset}"
              exit 1
            fi
          done

          echo "asset_dir=${asset_dir}" >> "${GITHUB_OUTPUT}"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.release_tag }}
          ASSET_DIR: ${{ steps.assets.outputs.asset_dir }}
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "${RELEASE_TAG}" > /dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" \
              "${ASSET_DIR}/main.js" \
              "${ASSET_DIR}/manifest.json" \
              "${ASSET_DIR}/styles.css" \
              --clobber
          else
            gh release create "${RELEASE_TAG}" \
              "${ASSET_DIR}/main.js" \
              "${ASSET_DIR}/manifest.json" \
              "${ASSET_DIR}/styles.css" \
              --title "${RELEASE_TAG}" \
              --notes "Release ${RELEASE_TAG}" \
              --target "${GITHUB_SHA}"
          fi
